name: Feature Request
description: Suggest a new resource, variable, or behaviour
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Describe what you'd like and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're hitting.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example configuration
      description: Optional — show how you'd expect to call the module.
      render: hcl

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Container
        - Network
        - Volume
        - Config
        - Secret
        - Image
        - Registry Image
        - Plugin
        - Tag
        - Buildx Builder
        - Service (Swarm)
        - Root module / orchestration
        - CI / documentation
        - Other
    validations:
      required: true
