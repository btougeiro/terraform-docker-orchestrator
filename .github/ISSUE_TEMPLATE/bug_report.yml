name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant module configuration
      description: Paste the module block you're using (remove any secrets).
      render: hcl
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Full output from `tofu plan` or `tofu apply`.
      render: shell

  - type: input
    id: module_version
    attributes:
      label: Module version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: input
    id: tofu_version
    attributes:
      label: OpenTofu / Terraform version
      placeholder: "e.g. OpenTofu v1.6.2"
    validations:
      required: true

  - type: input
    id: provider_version
    attributes:
      label: kreuzwerker/docker provider version
      placeholder: "e.g. 4.1.0"
    validations:
      required: true
