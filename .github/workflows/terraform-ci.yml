name: OpenTofu CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate:
    name: Validate Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.2

      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive

      - name: Initialize and Validate Root
        run: |
          tofu init -backend=false
          tofu validate

      - name: Initialize and Validate Sub-modules
        run: |
          for dir in modules/*/; do
            if [ -f "${dir}main.tf" ]; then
              echo "Validating sub-module: ${dir}"
              cd "${GITHUB_WORKSPACE}/${dir}"
              tofu init -backend=false
              tofu validate
            fi
          done

  test:
    name: Run OpenTofu Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.2

      - name: OpenTofu Init and Test
        run: |
          tofu init -backend=false
          tofu test

  lint:
    name: Lint Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.2

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.48.0

      - name: Initialize and Run TFLint
        run: |
          # Root module
          echo "Linting root module..."
          tofu init -backend=false
          tflint --init
          tflint

          # Sub-modules
          for dir in modules/*/; do
            if [ -f "${dir}main.tf" ]; then
              echo "Linting sub-module: ${dir}"
              cd "${GITHUB_WORKSPACE}/${dir}"
              tofu init -backend=false
              tflint --init
              tflint
            fi
          done

  registry-publish:
    name: Publish to Terraform Registry
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.2

      - name: Configure Terraform Registry Credentials
        run: |
          tofu login ${{ env.TFE_HOSTNAME }}
        env:
          TFE_TOKEN: ${{ secrets.TFE_TOKEN }}
          TFE_HOSTNAME: ${{ env.TFE_HOSTNAME }}

      - name: Publish Module to Registry
        run: |
          tofu init -backend=false
          tofu test
        env:
          TFE_TOKEN: ${{ secrets.TFE_TOKEN }}
          TFE_HOSTNAME: ${{ env.TFE_HOSTNAME }}