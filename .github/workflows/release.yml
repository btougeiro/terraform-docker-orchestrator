name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    # Skip bot commits (e.g. terraform-docs auto-updates)
    if: ${{ !contains(github.event.head_commit.author.name, '[bot]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect bump type from merged PR labels
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for this commit — skipping release."
            echo "type=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(" ")')
          echo "PR #$PR_NUMBER labels: $LABELS"

          if echo "$LABELS" | grep -q "release:skip"; then
            echo "type=skip" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "release:minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            # Default: patch bump for any merged PR without an explicit skip label
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version tag
        if: steps.bump.outputs.type != 'skip'
        id: version
        run: |
          LATEST=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
          LATEST=${LATEST:-v0.0.0}

          MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            *)     PATCH=$((PATCH+1)) ;;
          esac

          TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next release: $TAG (bump: ${{ steps.bump.outputs.type }})"

      - name: Tag and publish GitHub release
        if: steps.bump.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            --latest
